services:
  frontend:
    build: ./news-truth-frontend
    ports:
      - "80:80"
    depends_on:
      - api

  api:
    build: ./news-truth-backend
    ports:
      - "8000:8000"
    env_file:
      - ./news-truth-backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./news-truth-backend/app:/app/app

  worker:
    build: ./news-truth-backend
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - ./news-truth-backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./news-truth-backend/app:/app/app

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: newstruth
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
